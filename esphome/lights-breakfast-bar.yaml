substitutions:
  device_name: lights-breakfast-bar
  friendly_name: "Breakfast Bar Lights"
  deviceicon: "mdi:lightbulb"
  friendlyname_left: Breakfast Bar Lights
  friendlyname_right: Hallway Toilet Light
  hotspot_ssid: "Breakfast Bar Hotspot"
  wifi_ssid: !secret wifi_ssid

packages:
  common_base: !include packages/common-base.yaml
  bk72xx_overlay: !include packages/bk72xx-overlay.yaml
  wifi_common: !include packages/wifi-common.yaml

## ---------------- ##
##    Status LED    ##
## ---------------- ##
status_led:
  pin:
    number: P9
    inverted: true

## ------------------ ##
##    Generic Sensors ##
## ------------------ ##
switch:
  - platform: restart
    id: restart_device
    name: "Reboot"

script:
  - id: long_press_reboot
    mode: single
    then:
      - lambda: |-
            ESP_LOGW("reboot", "Long-press detected on ${device_name} — rebooting in 2s");
      - delay: 2s
      - lambda: |-
            App.safe_reboot();

## ---------------- ##
##      Relays      ##
## ---------------- ##
output:
  # Left Relay
  - platform: gpio
    id: relay_left
    pin: P6
  # Right Relay
  - platform: gpio
    id: relay_right
    pin: P26

## ------------ ##
##    Lights    ##
## ------------ ##
light:
  # Left Light
  - platform: binary
    name: ${friendlyname_left}
    icon: ${deviceicon}
    output: relay_left
    id: light_left

  # Right Light
  - platform: binary
    name: ${friendlyname_right}
    icon: ${deviceicon}
    output: relay_right
    id: light_right

## ----------------- ##
##      Buttons      ##
## ----------------- ##
binary_sensor:
  # Left Button
  - platform: gpio
    id: button_left
    pin:
      number: P14
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - light.toggle: light_left
    # Fallback for manual reboot to reconnect to HA after wifi problems
    on_multi_click:
      - timing:
          - on for at least 10s
        then:
          - script.execute: long_press_reboot
    internal: True

  # Right Button
  - platform: gpio
    id: button_right
    pin:
      number: P24
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - light.toggle: light_right
    internal: True
