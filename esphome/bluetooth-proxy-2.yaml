substitutions:
  device_name: bluetooth-proxy-2
  friendly_name: Bluetooth Proxy 2
  hotspot_ssid: "Bluetooth Proxy 2 Hotspot"
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      # Enable software coexistence so the radio scheduler arbitrates
      # between WiFi and BLE rather than them competing blindly.
      # Bias toward BLE since that's the primary function of this device.
      CONFIG_SW_COEXIST_ENABLE: y
      CONFIG_SW_COEXIST_PREFERENCE_BT: y

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid_hall
  password: !secret wifi_password
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${hotspot_ssid}"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

## ------------------ ##
##    Generic Sensors ##
## ------------------ ##
sensor:
  - platform: wifi_signal
    name: "Wifi Signal Strength"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 86400.0;
    unit_of_measurement: "d"
    accuracy_decimals: 1
    update_interval: 5min

## --------------------------------- ##
##    Oral-B Decoded BLE Sensors     ##
## --------------------------------- ##
  - platform: template
    name: "Oral-B Duration"
    id: oralb_duration
    unit_of_measurement: "s"
    state_class: measurement
    accuracy_decimals: 0

  - platform: template
    name: "Oral-B Sector"
    id: oralb_sector
    accuracy_decimals: 0

text_sensor:
  - platform: template
    name: "Oral-B State"
    id: oralb_state

# Host interface pin mapping
# https://www.elecrow.com/download/product/DAC0010/Wireless_Module-ESP32-C6_DataSheet.pdf
# Shows the C6's left connector but physically reversed, so P$7 is at the top
# of the connector, connected to the host ESP32-S3 J11 pin 1.
#   C6 GPIO20 (left P$6) → host IO16_SCL
#   C6 EN     (left P$5) → host IO15_SDA
#
# Configure GPIO20 as input so it never drives the host I2C bus. I'm not
# certain about it's state at reset but they're typically inputs.
#
# The EN→SDA connection is potentially a problem for the C6 but that pin
# probably has an RC filter (typically ≥1µF) should be sufficient to absorb
# normal I2C bit pulses without triggering a chip reset.
#
# Despite this config the touchscreen still fails, possibly because of
# capacitance or power supply changes but I'm not convinced. I eventually cut
# the pin connecting EN to fix it.
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO20
      mode:
        input: true
        pullup: true
    id: host_scl_bridge
    internal: true
    name: ""

bluetooth_proxy:
  # Passive only — Oral-B data is fully decoded from BLE advertisements.
  # Active mode causes HA to attempt GATT connections to the toothbrush, which
  # stops passive scanning for ~20 s per attempt and disrupts WiFi via ADDBA
  # session teardowns, while always failing.
  active: false

esp32_ble_tracker:
  scan_parameters:
    # Passive scanning: don't send scan requests, just listen.
    # Oral-B broadcasts its data in the advertisement PDU so scan responses aren't needed.
    # Reduces RF transmit activity, leaving more headroom for reception.
    active: false
    # High BLE duty cycle (75%) — coexistence logic above keeps WiFi alive,
    # so we can afford to scan aggressively.
    interval: 160ms
    window: 120ms
  # Decode the toothbrush's BLE advertisements to consider changing it to work
  # offline (e.g. if wifi or HA was flaky.) This decoding seems to work
  # reliably but I don't think it's worth it to implement a bespoke serial protocol
  # to the host display.
  on_ble_advertise:
    - then:
        - lambda: |-
            // Decode Oral-B BLE advertisements (manufacturer ID 0x00DC = Procter & Gamble)
            for (auto& mfr : x.get_manufacturer_datas()) {
              if (mfr.uuid.get_uuid().len != ESP_UUID_LEN_16 ||
                  mfr.uuid.get_uuid().uuid.uuid16 != 0x00DC) continue;

              const auto& d = mfr.data;
              if (d.size() != 9 && d.size() != 11) {
                ESP_LOGW("oralb", "[%s] Unexpected payload length %d",
                         x.address_str().c_str(), d.size());
                continue;
              }

              // Byte layout (after company ID):
              // [0:1] model  [2] unknown  [3] state  [4] pressure
              // [5] minutes  [6] seconds  [7] mode   [8] sector
              // [9] sector_timer  [10] num_sectors  (11-byte messages only)
              uint8_t state_byte   = d[3];
              uint8_t pressure_raw = d[4];
              int     duration_s   = (int)d[5] * 60 + (int)d[6];
              uint8_t mode_byte    = d[7];
              uint8_t sector_raw   = d[8];

              const char* state_str;
              switch (state_byte) {
                case 0: state_str = "unknown";        break;
                case 1: state_str = "init";           break;
                case 2: state_str = "idle";           break;
                case 3: state_str = "running";        break;
                case 4: state_str = "charging";       break;
                case 5: state_str = "setup";          break;
                case 6: state_str = "flight_menu";    break;
                case 8: state_str = "selection_menu"; break;
                case 9: state_str = "off";            break;
                default: state_str = "other";         break;
              }

              // Map raw sector byte to 1-4 (or 0 = last sector complete)
              // Values sourced from the oralb-ble HA integration
              int sector = -1;
              if      (sector_raw == 1 || sector_raw == 9)                              sector = 1;
              else if (sector_raw == 2 || sector_raw == 10)                             sector = 2;
              else if (sector_raw == 3 || sector_raw == 11 || sector_raw == 19 || sector_raw == 27) sector = 3;
              else if (sector_raw == 4 || sector_raw == 7 || sector_raw == 15 || sector_raw == 31 || sector_raw == 39) sector = 4;
              else if (sector_raw >= 41 && sector_raw <= 55)                            sector = 0;

              // Pressure: raw values < 128 = normal, >= 144 = high
              const char* pressure_str = (pressure_raw >= 144) ? "high" : "normal";

              ESP_LOGI("oralb", "[%s] state=%s(%d) dur=%ds mode=%d sector=%d(raw=0x%02X) pressure=%s",
                       x.address_str().c_str(), state_str, state_byte,
                       duration_s, mode_byte, sector, sector_raw, pressure_str);

              id(oralb_duration).publish_state(duration_s);
              id(oralb_state).publish_state(std::string(state_str));
              if (sector >= 0)
                id(oralb_sector).publish_state(sector);
            }

