substitutions:
  device_name: "lights-bathroom"
  friendly_name: "Bathroom Lights"
  deviceicon: "mdi:light"
  lightname_1: "Light 1"
  lightname_2: "Light 2"
  hotspot_ssid: "Bathroom Lights Hotspot"
  wifi_ssid: !secret wifi_ssid

packages:
  common_base: !include packages/common-base.yaml
  bk72xx_overlay: !include packages/bk72xx-overlay.yaml
  wifi_common: !include packages/wifi-common.yaml

## ------------------ ##
##    Generic Sensors ##
## ------------------ ##
## ---------------- ##
##    Status LED    ##
## ---------------- ##
status_led:
  pin:
    number: P1
    inverted: true

script:
  - id: long_press_reboot
    mode: single
    then:
      - lambda: |-
            ESP_LOGW("reboot", "Long-press detected on ${device_name} — rebooting in 2s");
      - delay: 2s
      - lambda: |-
            App.safe_reboot();

## ---------------- ##
##      Relays      ##
## ---------------- ##
output:
  # Relay 1
  - platform: gpio
    id: relay_1
    pin: P8
  # Relay 2
  - platform: gpio
    id: relay_2
    pin: P26  
  # Relay 3
  - platform: gpio
    id: relay_3
    pin: P24

## ------------ ##
##    Lights    ##
## ------------ ##
light:
  # Light 1
  - platform: binary
    name: ${lightname_1}
    icon: ${deviceicon}
    output: relay_1
    id: light_1

  # Light 2
  - platform: binary
    name: ${lightname_2}
    icon: ${deviceicon}
    output: relay_2
    id: light_2

## ------------ ##
##  Exhaust Fan ##
## ------------ ##
fan:
  - platform: binary
    name: Fan
    output: relay_3
    id: fan_1

## ----------------- ##
##      Buttons      ##
## ----------------- ##
binary_sensor:
  # Button 1
  - platform: gpio
    id: button_1
    pin:
      number: P14
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - light.toggle: light_1
    # Fallback for manual reboot to reconnect to HA after wifi problems
    on_multi_click:
      - timing:
          - on for at least 10s
        then:
          - script.execute: long_press_reboot
    internal: True

  # Button 2
  - platform: gpio
    id: button_2
    pin:
      number: P9
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - light.toggle: light_2
    internal: True

    # Button 3
  - platform: gpio
    id: button_3
    pin:
      number: P10
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - fan.toggle: fan_1
    internal: True