substitutions:
  device_name: toothbrush-monitor
  friendly_name: "Toothbrush Monitor"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: "cVCi6rwnqwDgUJEa6sLk/7io+dAI6j1dBBdlxzxsiTs="

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Hotspot"
    password: !secret fallback_password

# not enough flash for normal web server or captive portal fallbacks

# bluetooth_proxy:
#   active: true

font:
  - file: 'arial.ttf'
    id: arial14
    size: 14
  - file: 'arial.ttf'
    id: arial16
    size: 16
  - file: 'arial.ttf'
    id: arial18
    size: 18
  - file: 'arial.ttf'
    id: arial60
    size: 60

switch:
  # I don't think there's a physical LED on the board, just a gpio for one, but also an indicator
  # on the screen for the led state.
  - platform: gpio
    name: "backlight"
    id: backlight
    pin: 27
    inverted: no
    restore_mode: ALWAYS_ON

sensor:
  - platform: homeassistant
    name: "Brushing Duration From Home Assistant"
    id: toby_brushing_duration
    entity_id: sensor.toby_brushing_duration

spi:
  clk_pin: 14
  mosi_pin: 13
  miso_pin: 12
  
color:
  - id: my_red
    red: 100%
    green: 0%
    blue: 0%
  - id: my_blue
    red: 0%
    green: 0%
    blue: 100%

display:
  - platform: ili9xxx
    model: ili9341
    dc_pin: 2
    cs_pin: 15
    rotation: 90
    color_palette: 8BIT
    invert_colors: false
    lambda: |-
      it.filled_rectangle( 40, 20, 32, 80, id(my_blue));
      it.filled_rectangle( 80, 20, 32, 80);
      it.filled_rectangle(120, 20, 32, 80);
      it.filled_rectangle(160, 20, 32, 80);
      it.filled_rectangle(200, 20, 32, 80);
      it.filled_rectangle(240, 20, 32, 80);
      it.filled_rectangle(280, 20, 32, 80);

      it.filled_rectangle( 40, 120, 32, 80);
      it.filled_rectangle( 80, 120, 32, 80);
      it.filled_rectangle(120, 120, 32, 80);
      it.filled_rectangle(160, 120, 32, 80);
      it.filled_rectangle(200, 120, 32, 80);
      it.filled_rectangle(240, 120, 32, 80);
      it.filled_rectangle(280, 120, 32, 80);
      it.printf( 20,  40, id(arial14), id(my_blue), "Morn");
      it.printf( 20, 140, id(arial16), id(my_blue), "Night");
      it.printf( 40, 205, id(arial14), id(my_blue), "Mo");
      it.printf( 80, 205, id(arial14), id(my_blue), "Tu");
      it.printf(120, 205, id(arial14), id(my_blue), "We");
      it.printf(160, 205, id(arial14), id(my_blue), "Th");
      it.printf(200, 205, id(arial14), id(my_blue), "Fr");
      it.printf(240, 205, id(arial14), id(my_blue), "Sa");
      it.printf(280, 205, id(arial14), id(my_blue), "Su");

      it.printf(100, 40, id(arial60), id(my_red), "%fs", id(toby_brushing_duration).state);

touchscreen:
  platform: xpt2046
  id: my_touchscreen
  cs_pin: 33
  update_interval: 50ms
  threshold: 400
  calibration:
    x_max: 3848
    x_min: 320
    y_max: 3848
    y_min: 240
  transform:
    mirror_x: false
    mirror_y: false
    swap_xy: false
  on_touch:
    - lambda: |-
          ESP_LOGI("cal", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
              touch.x,
              touch.y,
              touch.x_raw,
              touch.y_raw
              );

