substitutions:
  device_name: "lights-ensuite"
  friendly_name: "Ensuite Lights"
  deviceicon: "mdi:light"
  lightname_1: "Light 1"
  lightname_2: "Light 2"
  hotspot_ssid: "Ensuite Lights Recovery"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

bk72xx:
  board: wb3s

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: "p6VQq7nuXVaZbn96Q+HD/Z/2P9Q8+472t4Jq6HrBNew="

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid_front
  password: !secret wifi_password
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${hotspot_ssid}"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

## ---------------- ##
##    Status LED    ##
## ---------------- ##
status_led:
  pin:
    number: P1
    inverted: True

## ------------------ ##
##    Generic Sensors ##
## ------------------ ##
sensor:
  - platform: wifi_signal
    name: "Wifi Signal Strength"
    update_interval: 60s
  
  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 86400.0;
    unit_of_measurement: "d"
    accuracy_decimals: 1
    update_interval: 5min

script:
  - id: long_press_reboot
    mode: single
    then:
      - lambda: |-
            ESP_LOGW("reboot", "Long-press detected on ${device_name} — rebooting in 2s");
      - delay: 2s
      - lambda: |-
            App.safe_reboot();

## ---------------- ##
##      Relays      ##
## ---------------- ##
output:
  # Relay 1
  - platform: gpio
    id: relay_1
    pin: P8
  # Relay 2
  - platform: gpio
    id: relay_2
    pin: P26  
  # Relay 3
  - platform: gpio
    id: relay_3
    pin: P24

## ------------ ##
##    Lights    ##
## ------------ ##
light:
  # Light 1
  - platform: binary
    name: ${lightname_1}
    icon: ${deviceicon}
    output: relay_3
    id: light_1

  # Light 2
  - platform: binary
    name: ${lightname_2}
    icon: ${deviceicon}
    output: relay_2
    id: light_2

## ------------ ##
##  Exhaust Fan ##
## ------------ ##
fan:
  - platform: binary
    name: Fan
    output: relay_1
    id: fan_1

## ----------------- ##
##      Buttons      ##
## ----------------- ##
binary_sensor:
  # Button 1
  - platform: gpio
    id: button_1
    pin:
      number: P14
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - fan.toggle: fan_1
    internal: True

  # Button 2
  - platform: gpio
    id: button_2
    pin:
      number: P9
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - light.toggle: light_2
    internal: True

    # Button 3
  - platform: gpio
    id: button_3
    pin:
      number: P10
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - light.toggle: light_1
    # Fallback for manual reboot to reconnect to HA after wifi problems
    on_multi_click:
      - timing:
          - on for at least 10s
        then:
          - script.execute: long_press_reboot
    internal: True
