substitutions:
  device_name: air-con-emily
  friendly_name: "Emily Air Con"
  hotspot_ssid: "Emily Air Con Hotspot"

external_components:
  - source: github://DomiStyle/esphome-panasonic-ac

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32c6
  flash_size: 8MB
  framework:
    type: esp-idf

# Enable logging
logger:
  level: VERBOSE
#  hardware_uart: UART0

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid_front
      password: !secret wifi_password
    - ssid: !secret wifi_ssid_hall
      password: !secret wifi_password
  min_auth_mode: WPA2
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${hotspot_ssid}"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

light:
  - platform: status_led
    name: "Status LED"
    pin:
      number: GPIO8
      inverted: True
      ignore_strapping_warning: true

uart:
  - id: debug_uart
    tx_pin: GPIO16
    rx_pin: GPIO17
    baud_rate: 115200
  - id: uartbus1
    tx_pin: GPIO18
    rx_pin: GPIO19
    baud_rate: 9600
    parity: EVEN

interval:
  - interval: 1s
    then:
      - uart.write:
          id: debug_uart
          data: "hello\n"

button:
  - platform: template
    name: "Turn Off"
    on_press:
      - climate.control:
          id: climate_entity
          mode: "OFF"
  - platform: template
    name: "Turn On"
    on_press:
      then:
        - climate.control:
            id: climate_entity
            mode: "COOL"
            target_temperature: 23
            fan_mode: MEDIUM
            swing_mode: BOTH

climate:
  - platform: panasonic_ac
    id: climate_entity
    name: None
    # For CZ-TACG1
    type: cnt
    uart_id: uartbus1

    # For DNSK-P11
    # type: wlan

    horizontal_swing_select:
      name: Horizontal Swing Mode
    vertical_swing_select:
      name: Vertical Swing Mode
    outside_temperature:
      name: Outside Temperature

    # Enable as needed
    eco_switch:
      name: Panasonic AC Eco Switch
    # econavi_switch:
    #   name: Panasonic AC Econavi Switch
    # nanoex_switch:
    #   name: Panasonic AC NanoeX Switch
    mild_dry_switch:
      name: Panasonic AC Mild Dry Switch
    # current_power_consumption:
    #   name: Panasonic AC Power Consumption

    # Adapt according to your measurements
    # current_temperature_offset: 0
    # outside_temperature_offset: 0

    # Useful when the ac does not report a current temperature (CZ-TACG1 only)
    # current_temperature_sensor: temperature_sensor_id