substitutions:
  device_name: air-con-emily
  friendly_name: "Emily Air Con"
  hotspot_ssid: "Emily Air Con Hotspot"

external_components:
  - source: github://hoangminh1109/PanaAC_ESPHome@de18d7d053e205eec7f4b9cedbdd61f919357dde

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32c6
  flash_size: 8MB
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid_front
      password: !secret wifi_password
    - ssid: !secret wifi_ssid_hall
      password: !secret wifi_password
  min_auth_mode: WPA2
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${hotspot_ssid}"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

light:
  - platform: status_led
    name: "Status LED"
    pin:
      number: GPIO8
      inverted: True
      ignore_strapping_warning: true

remote_receiver:
  pin:
    number: GPIO18
    inverted: true
    mode: OUTPUT_OPEN_DRAIN
    allow_other_uses: True # needed for same pin
  dump: panasonic
  tolerance: 55%
  id: ir_receiver
  idle: 5ms # required

remote_transmitter:
  pin:
    number: GPIO18
    inverted: True
    mode: OUTPUT_OPEN_DRAIN
    allow_other_uses: True # needed for same pin
  carrier_duty_percent: 50%
  non_blocking: true

button:
  - platform: template
    name: "Turn Off"
    on_press:
      - climate.control:
          id: climate_entity
          mode: "OFF"
  - platform: template
    name: "Turn On"
    on_press:
      then:
        - climate.control:
            id: climate_entity
            mode: "COOL"
            target_temperature: 23
            fan_mode: MEDIUM
            swing_mode: BOTH

climate:
  - platform: panaac
    id: climate_entity
    name: None
    receiver_id: ir_receiver
    supports_fan_only: true
    supports_heat: true
    supports_quiet: true
    fan_5level: true
    swing_horizontal: true
    temp_step: 1.0
    ir_control: false
