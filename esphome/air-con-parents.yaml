substitutions:
  device_name: air-con-parents
  friendly_name: "Parents Air Con"
  hotspot_ssid: "Parents Air Con Hotspot"

external_components:
  - source: github://hoangminh1109/PanaAC_ESPHome@de18d7d053e205eec7f4b9cedbdd61f919357dde

packages:
  common_base: !include packages/common-base.yaml
  esp8266_d1_mini: !include packages/esp8266-d1-mini.yaml
  wifi_front_and_hall: !include packages/wifi-front-and-hall.yaml

remote_receiver:
  pin:
    number: D2
    inverted: true
    mode: OUTPUT_OPEN_DRAIN
    allow_other_uses: True # needed for same pin
  dump: panasonic
  tolerance: 55%
  id: ir_receiver
  idle: 5ms # required

remote_transmitter:
  pin:
    number: D2
    inverted: True
    mode: OUTPUT_OPEN_DRAIN
    allow_other_uses: True # needed for same pin
  carrier_duty_percent: 50%

button:
  - platform: template
    name: "Turn Off"
    on_press:
      - climate.control:
          id: climate_entity
          mode: "OFF"
  - platform: template
    name: "Turn On"
    on_press:
      then:
        - climate.control:
            id: climate_entity
            mode: "COOL"
            target_temperature: 23
            fan_mode: MEDIUM
            swing_mode: BOTH

climate:
  - platform: panaac
    id: climate_entity
    name: None
    receiver_id: ir_receiver
    supports_fan_only: true
    supports_heat: true
    supports_quiet: true
    fan_5level: true
    swing_horizontal: true
    temp_step: 1.0
    ir_control: false
