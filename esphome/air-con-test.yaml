# Testing DAIKIN IR interface on ESP8285 IR transceiver board
substitutions:
  device_name: air-con-test
  friendly_name: Test Air Con
  hotspot_ssid: "Test Air Con Hotspot"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp8285

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${hotspot_ssid}"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

remote_receiver:
  pin:
    number: GPIO14
    inverted: true
  dump: all
  tolerance: 55%
  id: ir_receiver
  idle: 5ms # required

remote_transmitter:
  pin: GPIO4
  carrier_duty_percent: 50%

button:
  - platform: template
    name: "Turn Off"
    on_press:
      - climate.control:
          id: climate_entity
          mode: "OFF"

  - platform: template
    name: "Turn On"
    on_press:
      then:
        - climate.control:
            id: climate_entity
            mode: "COOL"
            target_temperature: 23
            fan_mode: MEDIUM
            swing_mode: BOTH

climate:
  - platform: daikin
    id: climate_entity
    name: None
    receiver_id: ir_receiver
    supports_cool: true
    supports_heat: true
