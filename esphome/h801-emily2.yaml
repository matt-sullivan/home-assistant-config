substitutions:
  device_name: h801-emily2
  friendly_name: "Emily Reading Light"
  hotspot_ssid: "EmilyReadingLight"
  wifi_ssid: !secret wifi_ssid

packages:
  common_base: !include packages/common-base.yaml
  esp8266_overlay: !include packages/esp8266-overlay.yaml
  wifi_common: !include packages/wifi-common.yaml
  reboot_common: !include packages/reboot-common.yaml

#RGBWarm
output:
  - platform: esp8266_pwm
    pin: 12
    frequency: 1000 Hz
    id: pwm_b
  - platform: esp8266_pwm
    pin: 13
    frequency: 1000 Hz
    id: pwm_r
  - platform: esp8266_pwm
    pin: 15
    frequency: 1000 Hz
    id: pwm_g
  - platform: esp8266_pwm
    pin: 14
    frequency: 1000 Hz
    id: pwm_w1
  - platform: esp8266_pwm
    pin: 4
    frequency: 1000 Hz
    id: pwm_w2
light:
  - platform: rgb
    name: "emily_rgb_strip"
    id: "emily_rgb_strip"
    red: pwm_r
    green: pwm_g
    blue: pwm_b
    effects:
      - pulse:
      - random:
      - strobe:
          name: Strobe
          colors:
            - state: true
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 250ms
            - state: true
              red: 100%
              green: 100%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 250ms
            - state: true
              red: 0%
              green: 100%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 250ms
            - state: true
              red: 0%
              green: 100%
              blue: 100%
              duration: 500ms
            - state: false
              duration: 250ms
            - state: true
              red: 0%
              green: 0%
              blue: 100%
              duration: 500ms
            - state: false
              duration: 250ms
            - state: true
              red: 100%
              green: 0%
              blue: 100%
              duration: 500ms
            - state: false
              duration: 250ms
            - state: true
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 250ms
  - platform: monochromatic
    name: "emily_white_strip"
    id: "emily_white_strip"
    output: pwm_w1
  - platform: monochromatic
    name: "emily_reading2"
    id: "emily_reading2"
    output: pwm_w2
          
binary_sensor:
  - platform: gpio
    name: "emily_reading_button2"
    id: "emily_reading_button2"
    pin:
      number: 3
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    on_press:
      then:
        - light.toggle: emily_reading2
