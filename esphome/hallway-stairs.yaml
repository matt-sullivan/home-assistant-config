substitutions:
  device_name: hallway-stairs
  friendly_name: Hallway Stairs
  light_1_name: "Stair Bottom Landing Light" 
  light_2_name: "Internal Stair Light"
  hotspot_ssid: "Hallway Stairs Hotspot"
  wifi_ssid: !secret wifi_ssid

packages:
  common_base: !include packages/common-base.yaml
  bk72xx_overlay: !include packages/bk72xx-overlay.yaml
  wifi_common: !include packages/wifi-common.yaml

## ---------------- ##
##    Status LED    ##
## ---------------- ##
status_led:
  pin:
    number: P24
    inverted: true

## ------------------ ##
##    Generic Sensors ##
## ------------------ ##
script:
  - id: long_press_reboot
    mode: single
    then:
      - lambda: |-
            ESP_LOGW("reboot", "Long-press detected on ${device_name} — rebooting in 2s");
      - delay: 2s
      - lambda: |-
            App.safe_reboot();

switch:
  - platform: restart
    id: restart_device
    name: "Reboot"

  # --- Raw relay outputs (internal) ---
  - platform: gpio
    id: relay_1
    pin: P14
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: relay_2
    pin: P6
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

# --- HA-facing entities that stay in sync ---
light:
  - platform: binary
    output: filter_1
    id: light_1
    name: "${light_1_name}"
  
  - platform: binary
    output: filter_2
    id: light_2
    name: "${light_2_name}"

binary_sensor:
  # Local buttons
  - platform: gpio
    id: button_1
    pin:
      number: P26
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      - light.toggle: light_1
    # Fallback for manual reboot to reconnect to HA after wifi problems
    on_multi_click:
      - timing:
          - on for at least 10s
        then:
          - script.execute: long_press_reboot
    internal: true

  - platform: gpio
    id: button_2
    pin:
      number: P23
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      - light.toggle: light_2
    # Fallback for manual reboot to reconnect to HA after wifi problems
    on_multi_click:
      - timing:
          - on for at least 10s
        then:
          - script.execute: long_press_reboot
    internal: true

  # Activation statuses
  - platform: gpio
    id: activation_status_1
    name: "Power Status 1"
    pin:
      number: P8
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_state:
      then:
        - light.control:
            id: light_1
            state: !lambda "return x;"

  # P9 is not reliable, often continuously toggles
  # - platform: gpio
  #   id: activation_status_2
  #   name: "Power Status 2"
  #   pin:
  #     number: P9
  #     mode: INPUT_PULLUP
  #     inverted: true
  #   filters:
  #      - delayed_on: 30ms
  #      - delayed_off: 30ms
  #    on_state:
  #      then:
  #        - light.control:
  #            id: light_1
  #            state: !lambda "return x;"

output:
  # Triggered when the "light" entity is turned on or off. Will only toggle
  # the associated relay if the "light" entity is out of sync with the
  # "activation status"; otherwise do nothing as the state is already correct.
  - platform: template
    type: binary
    id: filter_1
    write_action:
      then:
        - if:
            condition:
              - lambda: "return state != id(activation_status_1).state;"
            then:
              - switch.toggle: relay_1

  - platform: template
    type: binary
    id: filter_2
    write_action:
      then:
        # Disabled because unreliable P9
        # - if:
        #     condition:
        #       - lambda: "return state != id(activation_status_2).state;"
        #     then:
        #       - switch.toggle: relay_2
          - switch.toggle: relay_2
