substitutions:
  name: hallway-stairs
  friendly_name: Hallway Stairs
  light_1_name: "Stair Bottom Landing Light" 
  light_2_name: "Internal Stair Light"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

bk72xx:
  board: wb3s

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Hotspot"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password


## ------------------ ##
##    Generic Sensors ##
## ------------------ ##
sensor:
  - platform: wifi_signal
    name: Wifi Signal Strength
    update_interval: 60s
  
  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 86400.0;
    unit_of_measurement: "d"
    accuracy_decimals: 1
    update_interval: 5min

## ---------------- ##
##    Status LED    ##
## ---------------- ##
status_led:
  pin:
    number: P24
    inverted: true

# --- Raw relay outputs (internal) ---
switch:
  - platform: gpio
    id: relay_1
    pin: P14
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: relay_2
    pin: P6
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: restart
    name: "${friendly_name} REBOOT"

  # --- HA-facing entities that stay in sync ---
  - platform: template
    id: channel_1
    name: "${light_1_name}"
    lambda: |-
      // Return the *actual* circuit state as seen from traveller sense:
      return id(activation_1).state;
    turn_on_action:
      - if:
          condition:
            lambda: "return !id(activation_1).state;"
          then:
            - switch.toggle: relay_1
    turn_off_action:
      - if:
          condition:
            lambda: "return id(activation_1).state;"
          then:
            - switch.toggle: relay_1

  - platform: template
    id: channel_2
    name: "${light_2_name}"
    lambda: |-
      return id(relay_2).state;
    turn_on_action:
      - switch.toggle: relay_2
    turn_off_action:
      - switch.toggle: relay_2

binary_sensor:
  # Local buttons
  - platform: gpio
    id: button_1
    pin:
      number: P26
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - switch.toggle: channel_1
    internal: true

  - platform: gpio
    id: button_2
    pin:
      number: P23
      inverted: true
      mode: INPUT_PULLUP
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - switch.toggle: channel_2
    internal: true

  # Activation status lines (keep both until confirmed)
  - platform: gpio
    id: activation_1
    pin:
      number: P8
      mode: INPUT_PULLUP
      inverted: true
    internal: true

  # P9 is not reliable, sometimes continuously toggles
  # - platform: gpio
  #   id: activation_2
  #   pin:
  #     number: P9
  #     mode: INPUT_PULLUP
  #     inverted: true
  #   internal: true
