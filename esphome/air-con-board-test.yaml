substitutions:
  device_name: air-con-board-test
  friendly_name: "Air Con Board Test"
  hotspot_ssid: "Air Con Board Test"

external_components:
  - source: github://DomiStyle/esphome-panasonic-ac

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32c6
  flash_size: 8MB
  framework:
    type: esp-idf

# Enable logging
logger:
  level: VERBOSE
#  hardware_uart: UART0

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid_front
      password: !secret wifi_password
    - ssid: !secret wifi_ssid_hall
      password: !secret wifi_password
  min_auth_mode: WPA2
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${hotspot_ssid}"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

light:
  - platform: status_led
    name: "Status LED"
    pin:
      number: GPIO8
      inverted: True
      ignore_strapping_warning: true

uart:
  - id: debug_uart
    tx_pin: GPIO16
    rx_pin: GPIO17
    baud_rate: 9600
    debug:
      direction: BOTH
      dummy_receiver: true
      debug_prefix: "[UARTPROG] "
      after:
        delimiter: "\n"
      sequence:
        - lambda: UARTDebug::log_string(direction, bytes, debug_prefix);
  - id: uartbus1
    tx_pin: GPIO18
    rx_pin: GPIO19
    baud_rate: 9600
    debug:
      direction: BOTH
      dummy_receiver: true
      debug_prefix: "[UARTCOMMS] "
      after:
        delimiter: "\n"
      sequence:
        - lambda: UARTDebug::log_string(direction, bytes, debug_prefix);



interval:
  - interval: 1s
    then:
      - logger.log: "Sending test data to UARTs"
      - uart.write:
          id: debug_uart
          data: "hello 0123456789 0123456789 0123456789 0123456789 0123456789\n"
      - uart.write:
          id: uartbus1
          data: "hello 0123456789 0123456789 0123456789 0123456789 0123456789\n"
      - lambda: |-
          id(debug_uart).flush();
          id(uartbus1).flush();
