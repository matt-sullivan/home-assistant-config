substitutions:
  device_name: lights-entry
  friendly_name: "Entry Lights"
  hotspot_ssid: "Entry Lights Recovery"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp01_1m
  restore_from_flash: true

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 24h

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid_front
  password: !secret wifi_password
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${hotspot_ssid}"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

## ---------------- ##
##    Status LED    ##
## ---------------- ##
status_led:
  pin:
    number: GPIO0
    inverted: True

## ------------------ ##
##    Generic Sensors ##
## ------------------ ##
sensor:
  - platform: wifi_signal
    name: "Wifi Signal Strength"
    update_interval: 60s
  
  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 86400.0;
    unit_of_measurement: "d"
    accuracy_decimals: 1
    update_interval: 5min

script:
  - id: long_press_reboot
    mode: single
    then:
      - lambda: |-
            ESP_LOGW("reboot", "Long-press detected on ${device_name} — rebooting in 2s");
      - delay: 2s
      - lambda: |-
            App.safe_reboot();

output:
  # 1st button
  - platform: gpio
    pin: GPIO5
    id: relay1

  # 2nd button
  - platform: gpio
    pin: GPIO14
    id: relay2

  # 3rd button
  - platform: gpio
    pin: GPIO12
    id: relay3

  # 4th button
  - platform: gpio
    pin: GPIO15
    id: relay4

light:
  # 1st button
  - platform: binary
    name: "Hallway Entry"
    output: relay1
    id: hallway_entry

  # 2nd button
  - platform: binary
    name: "Front Deck"
    output: relay2
    id: front_deck

  # 3rd button
  - platform: binary
    name: "Front Yard Sensor Light"
    output: relay3
    id: front_yard_sensor

  # 4th button
  - platform: binary
    name: "Mailbox"
    output: relay4
    id: mailbox

# Buttons
binary_sensor:
  # 1st button
  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT
      inverted: True
    name: "Hallway Lights Front Entry Button"
    #toggle relay on push
    on_click:
      - light.toggle: hallway_entry
      # Propogate to the HA group it belongs to
      # this should be safer than an automation within HA because it only fires on the button press
      # so it can't get in a loop/race between updates
      - if:
          condition:
            light.is_on: hallway_entry
          then:
            - homeassistant.service:
                service: homeassistant.turn_on
                data:
                  entity_id: group.hallway_lights
          else:
            - homeassistant.service:
                service: homeassistant.turn_off
                data:
                  entity_id: group.hallway_lights
    on_multi_click:
      - timing:
          - on for at least 1s
        then:
          - event.trigger:
              id: button_1
              event_type: "Long Press"
      # Fallback for manual reboot to reconnect to HA after wifi problems
      - timing:
          - on for at least 10s
        then:
          - script.execute: long_press_reboot

  # 2nd button
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: True
    name: "Front Deck Lights Button"
    #toggle relay on push
    on_press:
      - light.toggle: front_deck

  # 3rd button
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: True
    name: "Front Yard Sensor Light Button"
    on_press:
      - light.toggle: front_yard_sensor
    # toggle relay on long press - to avoid accidentally turning it off
    #on_click:
    #  min_length: 2000ms
    #  max_length: 60000ms
    #  then:
    #    - light.toggle: front_yard_sensor

  # 4th button
  - platform: gpio
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
      inverted: True
    name: "Mailbox Light Button"
    #toggle relay on push
    on_press:
      - light.toggle: mailbox

switch:
  - platform: restart
    name: "Reboot"

##########################
# Event exposed to HA (doesn't trigger anything within this ESPHome device)
event:
  - platform: template
    id: button_1
    name: Button 1
    device_class: "button"
    event_types:
      - "Long Press"
