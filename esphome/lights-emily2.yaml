substitutions:
  device_name: lights-emily2
  friendly_name: "Emily Lights"
  deviceicon: "mdi:light-recessed"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

bk72xx:
  board: wb3s

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Hotspot"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

status_led:
  pin:
    number: P24
    inverted: true

uart:
  rx_pin: P10
  tx_pin: P11
  baud_rate: 9600

sensor:
  - platform: wifi_signal
    name: "Wifi Signal Strength"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"

# Register the Tuya MCU connection
tuya:

# light settings
light:
  - platform: "tuya"
    name: "${friendly_name}"
    # dimmers current value
    dimmer_datapoint: 2
    # dimmer on/off
    switch_datapoint: 1
    min_value_datapoint: 3
    min_value: 0
    max_value: 1000

switch:
  - platform: restart
    name: "Reboot"
