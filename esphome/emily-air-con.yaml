substitutions:
  device_name: emily-air-con
  friendly_name: Emily Air Con
  hotspot_ssid: "Emily Air Con Hotspot"

external_components:
  # panaac component copied from 
  # - source: github://hoangminh1109/PanaAC_ESPHome@c78c3a4
  # but I couldn't get that to work as a esphome git reference
  - source: components

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # build_path: "../config/esphome/${device_name}_build"

esp8266:
  board: esp8285

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  reboot_timeout: 24h
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 1h

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${hotspot_ssid}"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

remote_receiver:
  pin:
    number: GPIO14
    inverted: true
#  dump: all
  tolerance: 55%
  id: ir_receiver
  idle: 5ms # required

remote_transmitter:
  pin: GPIO4
  carrier_duty_percent: 50%

climate:
  - platform: panaac
    name: ${friendly_name}
    receiver_id: ir_receiver
    # supports_fan_only: true
    supports_heat: true
    supports_quiet: true
    fan_5level: true
    swing_horizontal: false
    temp_step: 1.0
    # ir_control: false
