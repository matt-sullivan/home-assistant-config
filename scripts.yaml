kids_wakeup:
  alias: Kids Wake Up
  description: Start kids wake up music and lights
  variables:
    chromecast_id: media_player.tobys_bedroom_speaker
    count: 10
    start_volume: 0.2
    max_volume: 0.5
  sequence:
    - service: spotcast.start
      continue_on_error: true
      data:
        uri: spotify:playlist:4WyHdt802ozHHPWq1BNUUB
        random_song: true
        repeat: true
        shuffle: true
        start_volume: "{{start_volume * 100}}"
        entity_id: "{{chromecast_id}}"
    - repeat:
        count: "{{count}}"
        sequence:
          - service: media_player.volume_set
            data:
              entity_id: "{{chromecast_id}}"
              volume_level: "{{start_volume + (max_volume - start_volume) * (repeat.index|float / count)}}"
          - service: scene.apply
            data:
              entities:
                light.toby_reading_2:
                  brightness: "{{repeat.index|float / count * 255}}"
                  state: "on"
                light.kids_short_w:
                  brightness: "{{repeat.index|float / count * 255}}"
                  state: "on"
                light.kids_short_rgb:
                  state: "off"
                light.tobyfroglight:
                  color_mode: onoff
                  state: 'on'
          - delay:
              hours: 0
              minutes: 1
              seconds: 0
              milliseconds: 0
  mode: restart

toby_reading_time:
  alias: Toby Reading Time
  sequence:
    - service: scene.apply
      data:
        entities:
          light.toby_reading_2:
            brightness: 255
            state: "on"
          light.tobyfroglight:
            state: 'on'
          light.toby_star_light:
            state: 'on'
          light.toby_main:
            state: "off"

toby_sleep_time:
  alias: Toby Sleep Time
  description: Sleep music and night lights
  variables:
    chromecast_id: media_player.tobys_bedroom_speaker
  sequence:
    - service: scene.apply
      data:
        entities:
          light.toby_main:
            state: "off"
          light.kids_short_w:
            state: "off"
          light.toby_reading_2:
            state: "off"
          light.tobyfroglight:
            state: 'on'
          light.toby_star_light:
            state: 'on'
    - if:
        - alias: "Use Music Assistant not spotify"
          condition: state
          entity_id: input_boolean.music_assistant_no_spotify
          state: "on"
      then:
        - action: media_player.volume_set
          data:
            volume_level: "{{states('input_number.toby_start_volume') | int() /100}}"
          target:
            entity_id: media_player.tobys_bedroom_speaker_ma
        - action: music_assistant.play_media
          data:
            media_id: library://playlist/6 # toby sleep music
            enqueue: replace
          target:
            entity_id: media_player.tobys_bedroom_speaker_ma
        - action: media_player.repeat_set
          target:
            entity_id: media_player.tobys_bedroom_speaker_ma
          data:
            repeat: all
      else:
        - service: spotcast.start
          continue_on_error: true
          data:
            account: "toby"
            uri: spotify:playlist:7EbLEaryNgBBqquiY4ALTd
            start_volume: "{{states('input_number.toby_start_volume') | int()}}"
            entity_id: "{{chromecast_id}}"
        # Setting repeat doens't seem to work. It takes a while before playing on a device appears
        # against the specific person's account, so maybe I need to wait until that happens before
        # I can set repeat.
        - delay:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
        - service: media_player.repeat_set
          target:
            entity_id: media_player.spotify_toby_sullivan
          data:
            repeat: all
    - delay:
        hours: 2
        minutes: 0
        seconds: 0
        milliseconds: 0
    - service: media_player.turn_off
      data:
        entity_id: "{{chromecast_id}}"
  mode: restart

