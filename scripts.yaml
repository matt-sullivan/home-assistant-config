toby_all_off:
  alias: Toby All Off
  description: Turn off everything in Toby's room
  sequence:
      - service: light.turn_off
        target:
          area_id: kids_bedroom
      - service: fan.turn_off
        target:
          area_id: kids_bedroom
      - service: climate.turn_off
        target:
          area_id: kids_bedroom
      - action: media_player.turn_off
        target:
          entity_id: media_player.tobys_bedroom_speaker
      - action: script.turn_off
        target:
          entity_id: script.toby_sleep_time

emily_all_off:
  alias: Emily All Off
  description: Turn off everything in Emily's room
  sequence:
      - service: light.turn_off
        target:
          area_id: toy_room
      - service: fan.turn_off
        target:
          area_id: toy_room
      - service: climate.turn_off
        target:
          area_id: toy_room
      - action: media_player.turn_off
        target:
          entity_id: media_player.emilys_bedroom_speaker
      - action: script.turn_off
        target:
          entity_id: script.emily_sleep_time

leaving_home:
  alias: Leaving Home
  description: Turn off lights and open garage door when leaving home
  sequence:
      - service: light.turn_off
        target:
          entity_id: all
      - service: fan.turn_off
        target:
          entity_id: all
      - service: cover.open_cover
        target:
          entity_id: cover.garage_door
      - action: media_player.turn_off
        target:
          entity_id:
            - media_player.emilys_bedroom_speaker
            - media_player.tobys_bedroom_speaker
      - action: script.turn_off
        target:
          entity_id: 
            - script.emily_sleep_time
            - script.toby_sleep_time
      - service: climate.turn_off
        target:
          entity_id: all
        data: {}
      - if:
          - condition: not
            conditions:
              - condition: state
                entity_id:
                  - binary_sensor.downstairs_laundry_door
                  - binary_sensor.downstairs_deck_door
                state: "off"
        then:
          - repeat:
              count: 3
              sequence:
                - action: light.turn_on
                  metadata: {}
                  data: {}
                  target:
                    entity_id: light.hallway_entry
                - delay:
                    hours: 0
                    minutes: 0
                    seconds: 0
                    milliseconds: 400
                - action: light.turn_off
                  metadata: {}
                  data: {}
                  target:
                    entity_id: light.hallway_entry
                - delay:
                    hours: 0
                    minutes: 0
                    seconds: 0
                    milliseconds: 400
