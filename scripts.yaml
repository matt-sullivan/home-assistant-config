spotify_test_2:
  alias: Spotify/google home test
  description: Attempt to play spotify on kitchen google home, this does work
    (as long as the HACS custom component version matches the spotify component and the cast component provided by the OS)
    continue_on_error doesn't appear to work, because it's often an exception/compile error rather than error result 
  sequence:
    - action: media_player.volume_set
      data:
        volume_level: "{{states('input_number.toby_start_volume') | int() /100}}"
      target:
        entity_id: media_player.kitchen_speaker_ma
    - action: music_assistant.play_media
      data:
        # toby sleep music live from spotify, running under Tobys account
        media_id: spotify--ZrkegGzq://playlist/7EbLEaryNgBBqquiY4ALTd
        enqueue: replace
      target:
        entity_id: media_player.kitchen_speaker_ma
    - action: media_player.repeat_set
      target:
        entity_id: media_player.kitchen_speaker_ma
      data:
        repeat: all
  mode: restart

toby_wakeup:
  alias: Toby Wake Up
  description: >-
    Alarm-style wake up: plays an alarm-like song via Music Assistant, ramps the
    volume from the alarm start to end input numbers, turns on the main light and
    opens the blinds. Intended to be triggered by the scheduler card.
  variables:
    ma_speaker: media_player.tobys_bedroom_speaker_ma
    count: 10
  sequence:
    - action: cover.open_cover
      target:
        entity_id:
          - cover.tobys_front_blind
          - cover.tobys_side_blind
    - action: light.turn_on
      target:
        entity_id: light.toby_main
    - action: media_player.volume_set
      target:
        entity_id: "{{ ma_speaker }}"
      data:
        volume_level: "{{ states('input_number.toby_alarm_start_volume') | float / 100 }}"
    - action: music_assistant.play_media
      target:
        entity_id: "{{ ma_speaker }}"
      data:
        # Alarm-like song; change media_id to any track/playlist name in your Music Assistant library
        media_id: spotify--ZrkegGzq://track/5GUuLf8s5KOEVYUzKx0PpQ
        media_type: track
        enqueue: replace
    - action: media_player.repeat_set
      target:
        entity_id: "{{ ma_speaker }}"
      data:
        repeat: all
    - repeat:
        count: "{{ count }}"
        sequence:
          - delay:
              hours: 0
              minutes: 1
              seconds: 0
              milliseconds: 0
          - action: media_player.volume_set
            target:
              entity_id: "{{ ma_speaker }}"
            data:
              volume_level: >-
                {% set s = states('input_number.toby_alarm_start_volume') | float / 100 %}
                {% set e = states('input_number.toby_alarm_end_volume') | float / 100 %}
                {{ s + (e - s) * (repeat.index | float / count) }}
  mode: restart

toby_reading_time:
  alias: Toby Reading Time
  sequence:
    - service: scene.apply
      data:
        entities:
          light.toby_reading_2:
            brightness: 255
            state: "on"
          light.tobyfroglight:
            state: 'on'
          light.toby_star_light:
            state: 'on'
          light.toby_main:
            state: "off"

toby_sleep_time:
  alias: Toby Sleep Time
  description: Sleep music and night lights
  variables:
    chromecast_id: media_player.tobys_bedroom_speaker
  sequence:
    - service: scene.apply
      data:
        entities:
          light.toby_main:
            state: "off"
          light.kids_short_w:
            state: "off"
          light.toby_reading_2:
            state: "off"
          light.tobyfroglight:
            state: 'on'
          light.toby_star_light:
            state: 'on'
    - if:
        - alias: "Use Music Assistant not spotify"
          condition: state
          entity_id: input_boolean.music_assistant_no_spotify
          state: "on"
      then:
        - action: media_player.volume_set
          data:
            volume_level: "{{states('input_number.toby_start_volume') | int() /100}}"
          target:
            entity_id: media_player.tobys_bedroom_speaker_ma
        - action: music_assistant.play_media
          data:
            # toby sleep music copied to MA
            #media_id: library://playlist/6
            # toby sleep music live from spotify, running under Tobys account
            media_id: spotify--ZrkegGzq://playlist/7EbLEaryNgBBqquiY4ALTd
            enqueue: replace
          target:
            entity_id: media_player.tobys_bedroom_speaker_ma
        - action: media_player.repeat_set
          target:
            entity_id: media_player.tobys_bedroom_speaker_ma
          data:
            repeat: all
      else:
        - service: spotcast.start
          continue_on_error: true
          data:
            account: "toby"
            uri: spotify:playlist:7EbLEaryNgBBqquiY4ALTd
            start_volume: "{{states('input_number.toby_start_volume') | int()}}"
            entity_id: "{{chromecast_id}}"
        # Setting repeat doens't seem to work. It takes a while before playing on a device appears
        # against the specific person's account, so maybe I need to wait until that happens before
        # I can set repeat.
        - delay:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
        - service: media_player.repeat_set
          target:
            entity_id: media_player.spotify_toby_sullivan
          data:
            repeat: all
    - delay:
        hours: 2
        minutes: 0
        seconds: 0
        milliseconds: 0
    - service: media_player.turn_off
      data:
        entity_id: "{{chromecast_id}}"
  mode: restart

emily_reading_time:
  alias: Emily Reading Time
  description: Emily lights for bedtime reading
  sequence:
    - service: scene.apply
      data:
        entities:
          light.emily_reading2:
            brightness: 255
            state: "on"
          light.emily_rgb_strip:
            color_mode: rgb
            brightness: 130
            rgb_color:
              - 255
              - 255
              - 255
            state: "on"
          light.emily_white_strip:
            state: "off"
          light.emily_main:
            state: "off"
          light.emily_heart:
            state: "off"
          light.emily_sign:
            state: "off"
          light.emily_makeup:
            state: "off"

emily_sleep_time:
  alias: Emily Sleep Time
  description: Emily's music & night lights
  variables:
    end_volume: 8
    # Emilys speaker
    chromecast_id: media_player.emilys_bedroom_speaker
  sequence:
    - service: scene.apply
      continue_on_error: true
      data:
        entities:
          light.emily_reading2:
            state: "off"
          light.emily_white_strip:
            state: "off"
          light.emily_main:
            state: "off"
          light.emily_heart:
            state: "off"
          light.emily_sign:
            state: "off"
          light.emily_makeup:
            state: "off"
          light.emily_rgb_strip:
            color_mode: rgb
            brightness: 130
            rgb_color:
              - 255
              - 255
              - 255
            state: "on"
    - if:
        - alias: "Use Music Assistant not spotify"
          condition: state
          entity_id: input_boolean.music_assistant_no_spotify
          state: "on"
      then:
        - action: media_player.volume_set
          data:
            volume_level: "{{states('input_number.emily_start_volume') | int()/100}}"
          target:
            entity_id: media_player.emilys_bedroom_speaker_ma
        - action: music_assistant.play_media
          data:
            media_id: apple_music--heYPEpYU://playlist/p.rXAJLo5hM1WvLa6
            enqueue: replace
          target:
            entity_id: media_player.emilys_bedroom_speaker_ma
        - action: media_player.repeat_set
          target:
            entity_id: media_player.emilys_bedroom_speaker_ma
          data:
            repeat: all
      else:
        - service: spotcast.start
          continue_on_error: true
          data:
            account: "emily"
            # Emily 'Favourite''
            uri: spotify:playlist:6AEjlbDnBRswipN9HOMTrK
            # repeat: true| all doens't appear to work
            start_volume: "{{states('input_number.emily_start_volume') | int()}}"
            entity_id: "{{chromecast_id}}"
        # Setting repeat doens't seem to work. It takes a while before playing on a device appears
        # against the specific person's account, so maybe I need to wait until that happens before
        # I can set repeat.
        - delay:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
        - service: media_player.repeat_set
          target:
            entity_id: media_player.spotify_emily
          data:
            repeat: all
  mode: restart

