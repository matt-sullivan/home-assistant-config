template:
  - binary_sensor:
      - unique_id: pool_pump_running_20210920
        name: "Pool pump running"
        state: "{{ is_state('switch.smartswitch2', 'on') and (states('sensor.smartswitch2_energy_power') | default(0) | float > 100) }}"
      - unique_id: pool_samples_available_20210920
        name: "Pool samples available"
        state: "{{ is_state('binary_sensor.pool_pump_running', 'on') }}"
        delay_on: "0:05:00"
        delay_off: "0:00:00"
    sensor:
      - unique_id: pool_temp_filtered_20210920
        name: "Pool water temperature"
        state: "{{ states('sensor.pool_temp')|float|round(1) }}"
        availability: "{{ is_state('binary_sensor.pool_samples_available', 'on') }}"
        icon: "hass:thermometer"
        unit_of_measurement: '°C'
      - unique_id: pool_ph_filtered_20210920
        name: "ph mean"
        state: "{{ states('sensor.pool_ph')|float|round(1) }}"
        availability: "{{ is_state('binary_sensor.pool_samples_available', 'on') }}"
        unit_of_measurement: 'u'
      - unique_id: pool_orp_filtered_20210920
        name: "orp mean"
        state: "{{ states('sensor.pool_orp')|float|round(1) }}"
        availability: "{{ is_state('binary_sensor.pool_samples_available', 'on') }}"
        unit_of_measurement: 'mV'
